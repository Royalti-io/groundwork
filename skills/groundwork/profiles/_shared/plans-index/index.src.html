            window.parent.postMessage({ __iyke: true, kind: 'host.sendToActiveSession', request_id: reqId, payload: args }, '*');
          });
        },
        pin: () => { post('pin', {}); },
        notes: { send: (text, opts) => { post('notes.send', { text, ...opts }); if (!inShell) { try { navigator.clipboard.writeText(text); } catch (e) {} } } },
        inShell,
      });
    }
  };
  </script>
  <script crossorigin src="https://cdn.jsdelivr.net/npm/react@18.3.1/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdn.jsdelivr.net/npm/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.25.6/babel.min.js"></script>

  <!-- Live-reload (dev): when served over http(s) as a top-level page, poll this
       file's Last-Modified and reload when `groundwork watch` rewrites it. No-op
       on file:// and inside the Ikenga shell (embedded iframe). -->
  <script>
  (function () {
    if (location.protocol !== 'http:' && location.protocol !== 'https:') return;
    if (window.parent && window.parent !== window) return;
    var baseline = null;
    setInterval(function () {
      fetch(location.href, { method: 'HEAD', cache: 'no-store' }).then(function (r) {
        var lm = r.headers.get('last-modified');
        if (lm == null) return;
        if (baseline == null) { baseline = lm; return; }
        if (lm !== baseline) location.reload();
      }).catch(function () {});
    }, 4000);
  })();
  </script>
</head>

<body>
  <div id="root"><div style="padding:var(--space-6);color:var(--fg-muted);font-size:var(--text-body-sm)">Initializing…</div></div>

  <script type="text/babel" data-presets="env,react">
  (function () {
    const { useState, useEffect, useMemo, useRef, Fragment } = React;

    function readJson(id) {
      const el = document.getElementById(id); if (!el) return null;
      const raw = (el.textContent || '').trim(); if (!raw) return null;
      const fo = raw.indexOf('{'), fa = raw.indexOf('[');
      let start = -1, close = '}';
      if (fo >= 0 && (fa < 0 || fo < fa)) { start = fo; close = '}'; } else if (fa >= 0) { start = fa; close = ']'; }
      if (start < 0) return null;
      const end = raw.lastIndexOf(close); if (end < start) return null;
      try { return JSON.parse(raw.slice(start, end + 1)); } catch (e) { return null; }
    }
    const META = readJson('plans-index-meta') || {};
    let DATA = readJson('plans-index-data'); let MOCK = false;
    if (!DATA || !DATA.plans) { DATA = readJson('plans-index-mock-data') || { plans: [], stats: {} }; MOCK = true; }
    const ROOT_REL = (META.root_rel || '.').replace(/\/+$/, '');
    const link = (slug, rest) => (ROOT_REL === '.' ? '' : ROOT_REL + '/') + slug + '/' + rest;

    const I = {
      gate: 'M5 11V8a7 7 0 0 1 14 0v3M4 11h16v10H4zM12 15v3',
      design: 'M12 3l8 4.5v9L12 21l-8-4.5v-9zM12 3v18M4 7.5l8 4.5 8-4.5',
      subplan: 'M9 5h10M9 12h10M9 19h10M5 5h.01M5 12h.01M5 19h.01',
      table: 'M3 5h18v14H3zM3 10h18M9 5v14',
      tree: 'M9 4h11M9 9h11M9 14h11M9 19h11M4 4h.01M4 9h.01M4 14h.01M4 19h.01',
      spec: 'M14 3v5h5M14 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8z',
      search: 'M11 4a7 7 0 1 0 0 14 7 7 0 0 0 0-14zM20.5 20.5l-4.2-4.2',
    };
    function Icon({ d, size }) {
      return <svg viewBox="0 0 24 24" width={size || 13} height={size || 13} fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round">{d.split('M').filter(Boolean).map((s, i) => <path key={i} d={'M' + s} />)}</svg>;
    }

    function ProgressBar({ wps }) {
      const total = wps.total || 0;
      if (!total) return <div className="prog-empty">no work packages</div>;
      const order = ['done', 'in_progress', 'blocked', 'queued'];
      const known = order.reduce((a, k) => a + (wps[k] || 0), 0);
      const other = Math.max(0, total - known);
      return (
        <div className="prog">
          <div className="prog-bar">
            {order.map((k) => wps[k] ? <div key={k} className={'prog-seg ' + k} style={{ width: (wps[k] / total * 100) + '%' }} /> : null)}
            {other ? <div className="prog-seg queued" style={{ width: (other / total * 100) + '%' }} /> : null}
          </div>
          <div className="prog-legend">
            <span className="pl"><strong style={{ color: 'var(--achievement)', fontFamily: 'var(--font-mono)' }}>{wps.done || 0}/{total}</strong> done</span>
            {wps.in_progress ? <span className="pl"><span className="pl-dot in_progress" />{wps.in_progress} active</span> : null}
            {wps.blocked ? <span className="pl"><span className="pl-dot blocked" />{wps.blocked} blocked</span> : null}
            {wps.queued ? <span className="pl"><span className="pl-dot queued" />{wps.queued} queued</span> : null}
          </div>
        </div>
      );
    }

    function PlanCard({ p, art }) {
      const openLink = (href, e) => {
        // in-shell: route a "open this" note to the active session; standalone: follow href
        if (art.inShell && art.sendToActiveSession) { e.preventDefault(); art.sendToActiveSession({ prompt: 'Open `' + href + '` (groundwork artifact).', source: 'plans-index' }); }
      };
      return (
        <div className="card">
          <div className="card-head">
            <div className="card-head-main">
              <h3 className="card-title">{p.title || p.slug}</h3>
              <div className="card-slug">{p.path}</div>
            </div>
            <span className={'profile-chip ' + (p.profile || '')}>{p.profile || '—'}</span>
            <span className={'drift-dot ' + (p.drift ? 'drift' : 'ok')} title={p.drift ? 'docs drifted since last groundwork write' : 'in sync'} />
          </div>
          {p.goal ? <p className="card-goal">{p.goal}</p> : null}
          <ProgressBar wps={p.wps || {}} />
          <div className="meta-row">
            {p.gates && p.gates.total ? <span className="m"><Icon d={I.gate} /><span className="k">gates</span> {p.gates.total}</span> : null}
            {p.designs && p.designs.total ? <span className="m"><Icon d={I.design} /><span className="k">designs</span> {p.designs.total}{p.designs.locked ? '·' + p.designs.locked + '🔒' : ''}</span> : null}
            {p.subplans && p.subplans.total ? <span className="m"><Icon d={I.subplan} /><span className="k">subplans</span> {p.subplans.total}</span> : null}
            {p.updated ? <span className="updated">{p.updated}</span> : null}
          </div>
          <div className="card-actions">
            <a className={'btn is-primary' + (p.has && p.has.explorer ? '' : ' is-disabled')} href={link(p.slug, 'artifact/explorer.html')} target="_blank" rel="noreferrer" onClick={(e) => openLink(link(p.slug, 'artifact/explorer.html'), e)}><Icon d={I.tree} />Explorer</a>
            <a className={'btn' + (p.has && p.has.board ? '' : ' is-disabled')} href={link(p.slug, 'artifact/board.html')} target="_blank" rel="noreferrer" onClick={(e) => openLink(link(p.slug, 'artifact/board.html'), e)}><Icon d={I.table} />Board</a>
            <a className={'btn' + (p.has && p.has.livingspec ? '' : ' is-disabled')} href={link(p.slug, 'artifact/index.html')} target="_blank" rel="noreferrer" onClick={(e) => openLink(link(p.slug, 'artifact/index.html'), e)}><Icon d={I.spec} />Spec</a>
          </div>
        </div>
      );
    }

    function App({ art }) {
      const [theme, setTheme] = useState(() => ({ theme: document.documentElement.getAttribute('data-theme') || 'A', mode: document.documentElement.getAttribute('data-mode') || 'dark' }));
      const [profileFilter, setProfileFilter] = useState('all');
      const [driftOnly, setDriftOnly] = useState(false);
      const [sort, setSort] = useState('updated');
      const [query, setQuery] = useState('');

      useEffect(() => { if (art.inShell && art.pin) { try { art.pin(); } catch (e) {} } }, []);
      useEffect(() => {
        const obs = new MutationObserver(() => setTheme({ theme: document.documentElement.getAttribute('data-theme') || 'A', mode: document.documentElement.getAttribute('data-mode') || 'dark' }));
        obs.observe(document.documentElement, { attributes: true, attributeFilter: ['data-theme', 'data-mode'] });
        return () => obs.disconnect();
      }, []);
      const setAttr = (k, v) => { document.documentElement.setAttribute('data-' + k, v); setTheme((t) => ({ ...t, [k]: v })); };

      const plans = DATA.plans || [];
      const stats = DATA.stats || {};
      const profiles = useMemo(() => Object.keys(stats.by_profile || {}).sort(), [stats]);

      const shown = useMemo(() => {
        let r = plans.slice();
        if (profileFilter !== 'all') r = r.filter((p) => p.profile === profileFilter);
        if (driftOnly) r = r.filter((p) => p.drift);
        if (query.trim()) { const q = query.toLowerCase(); r = r.filter((p) => (p.title || '').toLowerCase().includes(q) || (p.slug || '').toLowerCase().includes(q) || (p.goal || '').toLowerCase().includes(q)); }
        const pct = (p) => p.wps && p.wps.total ? (p.wps.done || 0) / p.wps.total : -1;
        if (sort === 'updated') r.sort((a, b) => (b.updated || '').localeCompare(a.updated || ''));
        else if (sort === 'progress') r.sort((a, b) => pct(b) - pct(a));
        else if (sort === 'name') r.sort((a, b) => (a.title || a.slug).localeCompare(b.title || b.slug));
        return r;
      }, [plans, profileFilter, driftOnly, sort, query]);

      const rootName = (DATA.root && DATA.root.name) || 'plans';

      return (
        <div className="shell">
          <div className="topbar">
            <div className="topbar-titles">
              <span className="eyebrow"><span className="dot-tint" />groundwork · plans index{MOCK ? ' · mock' : ''}</span>
              <h1 className="topbar-title">{META.title || (DATA.root && DATA.root.path) || rootName}</h1>
            </div>
            <div className="topbar-spacer" />
            <div className="topbar-actions">
              <div className="search-box"><Icon d={I.search} size={13} /><input value={query} onChange={(e) => setQuery(e.target.value)} placeholder="Search plans…" spellCheck={false} /></div>
              <span className={'host-badge ' + (MOCK ? 'mock' : (art.inShell ? 'in-shell' : ''))}>{MOCK ? 'mock' : (art.inShell ? 'in-shell' : 'browser')}</span>
              <div className="seg" title="theme">{['A', 'B', 'C'].map((t) => <button key={t} className={theme.theme === t ? 'is-on' : ''} onClick={() => setAttr('theme', t)}>{t}</button>)}</div>
              <div className="seg" title="mode">{['dark', 'light'].map((m) => <button key={m} className={theme.mode === m ? 'is-on' : ''} onClick={() => setAttr('mode', m)}>{m[0].toUpperCase()}</button>)}</div>
            </div>
          </div>

          <div className="subhead">
            <span className="agg"><strong>{stats.count != null ? stats.count : plans.length}</strong> plans</span>
            <span className="agg"><strong className="achiev">{stats.wps_done || 0}</strong>/<strong>{stats.wps_total || 0}</strong> WPs done</span>
            {stats.drifted ? <span className="agg"><strong style={{ color: 'var(--danger)' }}>{stats.drifted}</strong> drifted</span> : null}
            <div className="filters">
              <button className={'chip' + (profileFilter === 'all' ? ' is-on' : '')} onClick={() => setProfileFilter('all')}>all<span className="n">{plans.length}</span></button>
              {profiles.map((pr) => <button key={pr} className={'chip' + (profileFilter === pr ? ' is-on' : '')} onClick={() => setProfileFilter(pr)}>{pr}<span className="n">{stats.by_profile[pr]}</span></button>)}
              <button className={'chip' + (driftOnly ? ' is-on' : '')} onClick={() => setDriftOnly(!driftOnly)} title="only plans with drift">drift</button>
              <span style={{ width: 1, height: 16, background: 'var(--border-soft)', margin: '0 4px' }} />
              {[['updated', 'recent'], ['progress', 'progress'], ['name', 'name']].map(([s, l]) => <button key={s} className={'chip' + (sort === s ? ' is-on' : '')} onClick={() => setSort(s)}>{l}</button>)}
            </div>
          </div>

          <div className="scroll">
            {shown.length === 0 ? (
              <div className="empty"><div style={{ color: 'var(--fg-faint)' }}><Icon d={I.tree} size={34} /></div><h3>No plans{query || profileFilter !== 'all' || driftOnly ? ' match' : ' found'}</h3><p>{plans.length === 0 ? 'No groundwork plans (folders with a .groundwork.json) under this directory yet.' : 'Adjust the filters or search to see plans.'}</p></div>
            ) : (
              <div className="grid">{shown.map((p) => <PlanCard key={p.slug} p={p} art={art} />)}</div>
            )}
          </div>
        </div>
      );
    }

    window.__groundwork_bridge_polyfill__.init().then((art) => ReactDOM.createRoot(document.getElementById('root')).render(<App art={art} />));
  })();
  </script>
</body>
</html>
