    /* ═════════════════════════════ Explorer chrome ═════════════════════════ */
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; background: var(--bg-base); }
    body {
      font-family: var(--font-body); font-size: var(--body-size, var(--text-body)); line-height: var(--body-lead, 1.55);
      color: var(--fg); -webkit-font-smoothing: antialiased;

    }
    button { font-family: inherit; }
    .mono { font-family: var(--font-mono); }

    /* The load-bearing clamp: a single full-height flex column that never page-
       scrolls, so the sidebar + viewer scroll independently (cross-browser,
       WebKitGTK included). Copied intent from the board's .shell. */
    .shell { height: 100vh; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; background: var(--bg-base); }

    /* Top bar */
    .topbar {
      display: flex; align-items: center; gap: var(--space-3);
      padding: var(--space-2) var(--space-4);
      border-bottom: 1px solid var(--border-soft); background: var(--bg-surface);
      flex-shrink: 0;
    }
    .topbar-titles { display: flex; flex-direction: column; gap: 1px; min-width: 0; }
    .topbar-eyebrow {
      font-family: var(--font-mono); font-size: 10px; letter-spacing: .14em; text-transform: uppercase;
      color: var(--fg-faint); display: inline-flex; align-items: center; gap: 6px;
    }
    .topbar-eyebrow .dot-tint { width: 6px; height: 6px; border-radius: 50%; background: var(--primary); }
    .topbar-title {
      font-family: var(--font-display); font-weight: 500; font-size: clamp(15px, 1.4vw, 19px);
      letter-spacing: -.01em; color: var(--fg); margin: 0; line-height: 1.2;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 52vw;
    }
    .topbar-spacer { flex: 1; }
    .topbar-actions { display: flex; align-items: center; gap: var(--space-2); flex-shrink: 0; }

    .seg { display: inline-flex; background: var(--bg-base); border: 1px solid var(--border-soft); border-radius: var(--radius-md); padding: 2px; gap: 2px; }
    .seg button {
      font-size: var(--text-micro); font-weight: 500; padding: 3px 9px; border-radius: var(--radius-sm);
      border: 0; background: transparent; color: var(--fg-muted); cursor: pointer;
      display: inline-flex; align-items: center; gap: 5px;
    }
    .seg button:hover { color: var(--fg); }
    .seg button.is-on { background: var(--bg-raised); color: var(--fg); box-shadow: var(--shadow-1); }
    .seg button.is-on svg { color: var(--primary); }
    .seg svg { width: 13px; height: 13px; opacity: .8; }

    .iconbtn {
      width: 30px; height: 28px; display: inline-flex; align-items: center; justify-content: center;
      background: var(--bg-base); border: 1px solid var(--border-soft); color: var(--fg-muted);
      border-radius: var(--radius-sm); cursor: pointer; transition: border-color var(--motion-fast) var(--ease-calm), color var(--motion-fast) var(--ease-calm);
    }
    .iconbtn:hover { border-color: var(--primary); color: var(--fg); }
    .iconbtn.is-on { border-color: var(--primary); color: var(--primary); }
    .iconbtn svg { width: 15px; height: 15px; }

    .host-badge {
      font-family: var(--font-mono); font-size: 10px; letter-spacing: .08em; text-transform: uppercase;
      padding: 3px 8px; border-radius: var(--radius-pill);
      background: var(--bg-base); border: 1px solid var(--border-soft); color: var(--fg-faint);
    }
    .host-badge.in-shell { background: var(--systemic-soft); border-color: var(--systemic); color: var(--systemic); }
    .host-badge.mock { background: var(--danger-soft); border-color: var(--danger); color: var(--danger); }

    /* Workspace grid: sidebar | main | (optional) rail */
    .workspace { flex: 1; display: grid; grid-template-columns: var(--sidebar-w, 296px) 1fr; min-height: 0; min-width: 0; }
    .workspace.with-rail { grid-template-columns: var(--sidebar-w, 296px) 1fr var(--rail-w, 300px); }

    /* Sidebar */
    .sidebar { border-right: 1px solid var(--border-soft); background: var(--bg-surface); display: flex; flex-direction: column; min-height: 0; overflow: hidden; }
    .sidebar-head { padding: var(--space-2) var(--space-3); border-bottom: 1px solid var(--border-soft); display: flex; align-items: center; gap: var(--space-2); }
    .sidebar-head .seg { flex: 1; }
    .sidebar-head .seg button { flex: 1; justify-content: center; }
    .sidebar-stats { font-family: var(--font-mono); font-size: 10px; color: var(--fg-faint); padding: 4px var(--space-3); border-bottom: 1px solid var(--border-soft); letter-spacing: .03em; }
    .sidebar-body { flex: 1; overflow: auto; padding: var(--space-2) var(--space-1) var(--space-4); }

    /* Search */
    .search { padding: var(--space-2) var(--space-3) 0; }
    .search-box { display: flex; align-items: center; gap: 6px; background: var(--bg-base); border: 1px solid var(--border-soft); border-radius: var(--radius-sm); padding: 5px 8px; }
    .search-box:focus-within { border-color: var(--primary); }
    .search-box svg { color: var(--fg-faint); flex-shrink: 0; }
    .search-box input { flex: 1; min-width: 0; border: 0; background: transparent; outline: 0; color: var(--fg); font-size: var(--text-body-sm); font-family: inherit; }
    .search-box input::placeholder { color: var(--fg-faint); }
    .search-clear { color: var(--fg-faint); cursor: pointer; display: inline-flex; flex-shrink: 0; }
    .search-clear:hover { color: var(--fg); }
    .search-kbd { font-family: var(--font-mono); font-size: 9px; color: var(--fg-faint); border: 1px solid var(--border-soft); border-radius: var(--radius-xs); padding: 1px 5px; flex-shrink: 0; }
    .results { padding: var(--space-2) var(--space-1); }
    .results-head { font-family: var(--font-mono); font-size: 9.5px; letter-spacing: .1em; text-transform: uppercase; color: var(--fg-faint); padding: 4px 8px var(--space-2); }
    .result { display: block; width: 100%; text-align: left; border: 0; background: transparent; cursor: pointer; border-radius: var(--radius-sm); padding: 6px 8px; color: var(--fg); }
    .result:hover { background: var(--bg-raised); }
    .result.is-active { background: var(--primary-soft); box-shadow: inset 2px 0 0 var(--primary); }
    .result-name { display: flex; align-items: center; gap: 6px; font-size: var(--text-body-sm); }
    .result-name .tree-icon { width: 14px; }
    .result-name .rn-text { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .result-path { font-family: var(--font-mono); font-size: 9.5px; color: var(--fg-faint); margin: 2px 0 0 20px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .result-snip { font-size: 11px; color: var(--fg-muted); margin: 3px 0 0 20px; line-height: 1.4; max-height: 2.9em; overflow: hidden; }
    .result-snip mark, .result-name mark { background: var(--achievement-soft); color: var(--achievement); border-radius: 2px; padding: 0 1px; }
    .result-badge { margin-left: auto; font-family: var(--font-mono); font-size: 8.5px; letter-spacing: .04em; text-transform: uppercase; color: var(--fg-faint); border: 1px solid var(--border-soft); border-radius: var(--radius-xs); padding: 0 4px; flex-shrink: 0; }
    .results-empty { padding: var(--space-5) var(--space-4); text-align: center; color: var(--fg-faint); font-size: var(--text-body-sm); }

    /* Tree */
    .tree-node { user-select: none; }
    .tree-row {
      display: flex; align-items: center; gap: 6px; width: 100%;
      padding: 3px 6px; border: 0; background: transparent; color: var(--fg); cursor: pointer;
      border-radius: var(--radius-sm); text-align: left; font-size: var(--text-body-sm); line-height: 1.3;
      transition: background var(--motion-fast) var(--ease-calm);
    }
    .tree-row:hover { background: var(--bg-raised); }
    .tree-row.is-active { background: var(--primary-soft); box-shadow: inset 2px 0 0 var(--primary); }

    }

    /* ── markdown render with fence-region highlighting ────────────────── */
    const stripMeta = (t) => t.replace(/^[ \t]*<!--[ \t]*last_action:[\s\S]*?-->[ \t]*$/gm, '');
    function mdHtml(t) {
      if (!window.marked) return (t || '').replace(/</g, '&lt;');
      const html = marked.parse(t || '');
      return window.DOMPurify ? DOMPurify.sanitize(html) : esc(t || '');
    }
    function renderMarkdownSegments(raw) {
      const re = /<!--\s*groundwork:auto:(start|end)\s+([\w-]+)\s*-->/g;
      const out = []; let last = 0, m, cur = null;
      const pushHand = (txt) => { if (txt && txt.trim()) out.push({ auto: false, html: mdHtml(txt) }); };
      while ((m = re.exec(raw)) !== null) {
        const seg = raw.slice(last, m.index);
        if (cur) cur.body += seg; else pushHand(seg);
        if (m[1] === 'start') { cur = { id: m[2], body: '' }; }
        else { if (cur) { out.push({ auto: true, id: cur.id, html: mdHtml(stripMeta(cur.body)) }); cur = null; } }
        last = re.lastIndex;
      }
      const tail = raw.slice(last);
      if (cur) out.push({ auto: true, id: cur.id, html: mdHtml(stripMeta(cur.body)) });
      else pushHand(tail);
      return out;
    }

    /* ── tree helpers ──────────────────────────────────────────────────── */
    function flatten(nodes, acc) { acc = acc || []; for (const n of nodes || []) { acc.push(n); if (n.children) flatten(n.children, acc); } return acc; }
    const ALL = flatten(DATA.tree);
    const byPath = {}; ALL.forEach((n) => { byPath[n.path] = n; });
    function srcFor(path) { return ROOT_REL + '/' + path; }

    const KIND_GROUPS = [
      ['spine', 'Spine'], ['subplan', 'Sub-plans'], ['artifact', 'Artifact'],
      ['design', 'Designs'], ['draft', 'Drafts'], ['parts', 'Parts'],
      ['asset', 'Assets'], ['anchor', 'State'], ['other', 'Other'],
    ];

    /* ── small persistence (localStorage; works standalone + webview) ──── */
    const PKEY = 'gw-explorer:' + ((DATA.plan && DATA.plan.slug) || META.plan_slug || 'plan');
    function loadState() { try { return JSON.parse(localStorage.getItem(PKEY) || '{}'); } catch (e) { return {}; } }
    function saveState(s) { try { localStorage.setItem(PKEY, JSON.stringify(s)); } catch (e) {} }

    /* ── badges ────────────────────────────────────────────────────────── */
    function NodeBadges({ node }) {
      const b = node.badges || {};
      const out = [];
      if (b.drift === 'drift') out.push(<span key="d" className="dot-drift drift" title="drifted from last groundwork write" />);
      else if (b.drift === 'in-sync') out.push(<span key="d" className="dot-drift insync" title="in sync" />);
      if (b.design) out.push(<span key="l" className={'b ' + (b.design.locked ? 'b-lock' : 'b-open')} title={b.design.locked_in || ''}>{b.design.locked ? 'lock' : 'wip'}</span>);
      if (b.subplan) out.push(<span key="s" className="b b-tint" title={b.subplan.ref || 'cross-cutting'}>{b.subplan.archetype || 'subplan'}</span>);
      // actionable docs (PUBLISH-NOW.md, ACTION-*.md) read as instructions, not plan prose
      if (/^(publish|action|urgent|now)\b/i.test(node.name) || /publish-now/i.test(node.name)) out.push(<span key="a" className="b b-warn" title="actionable — not a planning doc">action</span>);
      if (node.registered === false && node.type !== 'dir') out.push(<span key="u" className="b b-open" title="present on disk, not in .groundwork.json">unreg</span>);
      return out.length ? <span className="tree-badges">{out}</span> : null;
    }

    /* ── tree view ─────────────────────────────────────────────────────── */
    function TreeNode({ node, depth, open, toggle, activePath, onOpen }) {
      const isDir = node.type === 'dir';
      const isOpen = open[node.path] !== undefined ? open[node.path] : depth < 1;
      return (
        <div className="tree-node">
          <button className={'tree-row' + (activePath === node.path ? ' is-active' : '')}
            style={{ paddingLeft: 6 + depth * 4 }}
            onClick={() => isDir ? toggle(node.path, !isOpen) : onOpen(node)}>
            <span className={'tree-caret' + (isDir && isOpen ? ' open' : '')}>{isDir ? <Icon d={I.chevron} size={12} /> : null}</span>
            <span className="tree-icon"><Icon d={typeIcon(node.kind === 'anchor' ? 'anchor' : node.type)} /></span>
            <span className={'tree-name' + (isDir ? ' is-dir' : '')}>{node.name}{isDir && node.empty ? ' ·' : ''}</span>
            <NodeBadges node={node} />
          </button>
          {isDir && isOpen && node.children && node.children.length > 0 && (
            <div className="tree-children">
              {node.children.map((c) => <TreeNode key={c.path} node={c} depth={depth + 1} open={open} toggle={toggle} activePath={activePath} onOpen={onOpen} />)}
            </div>
          )}
          {isDir && isOpen && node.empty && (
            <div className="tree-children"><div style={{ padding: '3px 10px', color: 'var(--fg-faint)', fontSize: 11, fontFamily: 'var(--font-mono)' }}>intentionally empty</div></div>
          )}
        </div>
      );
    }

    /* ── lazy iframe thumbnail — only mounts when scrolled near the viewport.
       Critical for design-system plans: a flowrights-scale gallery has 80+
       mockups, and mounting that many live iframes at once crashes the tab. ── */
    function LazyThumb({ node }) {
      const ref = useRef(null);
      const [show, setShow] = useState(false);
      useEffect(() => {
        const el = ref.current; if (!el || show) return;
        if (typeof IntersectionObserver === 'undefined') { setShow(true); return; }
        const io = new IntersectionObserver((es) => { if (es.some((e) => e.isIntersecting)) { setShow(true); io.disconnect(); } }, { rootMargin: '250px' });
        io.observe(el);
        return () => io.disconnect();
      }, [show]);
      return (
        <div className="gthumb" ref={ref}>
          {show ? <iframe src={srcFor(node.path)} title={node.name} loading="lazy" sandbox="allow-scripts allow-same-origin" />
                : <div className="gthumb-ph">{(node.name.split('.').pop() || 'file').toUpperCase()}</div>}
        </div>
      );
    }

    /* ── gallery (designs) ─────────────────────────────────────────────── */
    function Gallery({ nodes, activePath, onOpen }) {
      if (!nodes.length) return <div className="empty"><div className="empty-glyph"><Icon d={I.design} size={30} /></div><h3>No designs</h3><p>This plan has no <code>designs/</code> mockups yet.</p></div>;
      return (
        <div className="grid">
          {nodes.map((n) => (
            <div key={n.path} className={'gcard' + (activePath === n.path ? ' is-active' : '')} onClick={() => onOpen(n)}>
              <LazyThumb node={n} />
              <div className="gmeta">
                <span className="gname">{n.name}</span>
                <div className="gtags"><NodeBadges node={n} />{n.badges && n.badges.design && n.badges.design.wp ? <span className="b b-sys">{n.badges.design.wp}</span> : null}</div>
              </div>
            </div>
          ))}
        </div>
      );
    }

    /* ── media (images + slide/pdf renderers) ──────────────────────────── */
    function MediaGrid({ nodes, activePath, onOpen }) {
      if (!nodes.length) return <div className="empty"><div className="empty-glyph"><Icon d={I.media} size={30} /></div><h3>No media</h3><p>No images, PDFs, or slide renderers found.</p></div>;
      return (
        <div className="grid">
          {nodes.map((n) => (
            <div key={n.path} className={'gcard' + (activePath === n.path ? ' is-active' : '')} onClick={() => onOpen(n)}>
              {n.type === 'image' ? <div className="gthumb"><img src={srcFor(n.path)} alt={n.name} loading="lazy" onError={(e) => { e.target.style.display = 'none'; }} /></div>
                : n.type === 'svg' && n.embedded ? <div className="gthumb"><div className="gthumb-ph" dangerouslySetInnerHTML={{ __html: window.DOMPurify ? DOMPurify.sanitize(n.content, { USE_PROFILES: { svg: true, svgFilters: true } }) : '' }} /></div>
                : (n.type === 'design' || n.type === 'html-artifact') ? <LazyThumb node={n} />
                : <div className="gthumb"><div className="gthumb-ph">{n.type.toUpperCase()}</div></div>}
              <div className="gmeta"><span className="gname">{n.name}</span></div>
            </div>
          ))}
        </div>
      );
    }

    /* ── viewers ───────────────────────────────────────────────────────── */
    function MarkdownView({ node, sub }) {
      if (!node.embedded || node.content == null) return <ReferencedCard node={node} reason="Markdown body wasn't embedded (over the size budget). Open it from the plan folder." />;
      if (sub === 'raw') return <pre className="code">{node.content}</pre>;
      const segs = renderMarkdownSegments(node.content);
      return (
        <div className="viewer-pad md-body">
          {segs.map((s, i) => s.auto
            ? <div className="gw-auto" key={i}><div className="gw-auto-label">generated · {s.id}</div><div dangerouslySetInnerHTML={{ __html: s.html }} /></div>
            : <div key={i} dangerouslySetInnerHTML={{ __html: s.html }} />)}
        </div>
      );
    }
    function CodeView({ node }) {
      if (!node.embedded || node.content == null) return <ReferencedCard node={node} reason="File content wasn't embedded. Open it from the plan folder." />;
      let body = node.content;
      if (node.type === 'json') { try { body = JSON.stringify(JSON.parse(node.content), null, 2); } catch (e) {} }
      return <pre className="code">{body}</pre>;
    }
    function SvgView({ node }) {
      if (node.embedded && node.content != null) {
        const clean = window.DOMPurify ? DOMPurify.sanitize(node.content, { USE_PROFILES: { svg: true, svgFilters: true } }) : '';
        return <div className="svg-wrap" dangerouslySetInnerHTML={{ __html: clean }} />;
      }
      return <div className="img-wrap"><img src={srcFor(node.path)} alt={node.name} onError={(e) => { e.target.replaceWith(document.createTextNode('')); }} /></div>;
    }
    function ImageView({ node }) {
      const [zoom, setZoom] = useState(false);
      const [err, setErr] = useState(false);
      if (err) return <ReferencedCard node={node} reason="Image preview loads when the explorer is opened from inside the plan folder." />;
      return <div className={'img-wrap' + (zoom ? ' zoom' : '')} onClick={() => setZoom(!zoom)}><img src={srcFor(node.path)} alt={node.name} onError={() => setErr(true)} /></div>;
    }
    function FrameView({ node, sub, theme }) {
      const ref = useRef(null);
      const [loaded, setLoaded] = useState(false);
      const [graceOver, setGraceOver] = useState(false);
      // reset load tracking per node; after a short grace, if the frame still
      // hasn't fired `load`, it almost certainly couldn't resolve (lone upload /
      // detached file) — only THEN do we surface the hint. A working preview
      // (in-folder / in-shell) shows no caption at all.
      useEffect(() => {
        setLoaded(false); setGraceOver(false);
        const t = setTimeout(() => setGraceOver(true), 2500);
        return () => clearTimeout(t);
      }, [node.path]);
      useEffect(() => {
        const f = ref.current; if (!f) return;
        const push = () => { try { f.contentWindow.postMessage({ __iyke: true, kind: 'host-context', payload: theme }, '*'); } catch (e) {} };
        const onLoad = () => { setLoaded(true); push(); };
        f.addEventListener('load', onLoad); push();
        return () => f.removeEventListener('load', onLoad);
      }, [node.path, theme.theme, theme.mode, theme.density]);
      if (sub === 'source') return <FrameSource node={node} />;
      const pdf = node.type === 'pdf';
      return (
        <Fragment>
          <iframe ref={ref} className="frame" src={srcFor(node.path)} title={node.name}
            sandbox={pdf ? undefined : 'allow-scripts allow-same-origin allow-popups allow-forms'} />
          {!loaded && graceOver && (
            <div className="frame-caption">preview didn’t load — <code>{srcFor(node.path)}</code> resolves when the explorer is opened from inside the plan folder</div>
          )}
        </Fragment>
      );
    }
    function FrameSource({ node }) {
      const [state, setState] = useState({ loading: true, text: null });
      useEffect(() => {
        let alive = true;
        fetch(srcFor(node.path)).then((r) => r.text()).then((t) => { if (alive) setState({ loading: false, text: t }); })
          .catch(() => { if (alive) setState({ loading: false, text: null }); });
        return () => { alive = false; };
      }, [node.path]);
      if (state.loading) return <div className="empty"><p>Loading source…</p></div>;
      if (state.text == null) return <ReferencedCard node={node} reason="Source is fetched live — available in the Ikenga shell or when opened from the plan folder (browsers block file:// fetches)." />;
      return <pre className="code">{state.text}</pre>;
    }
    function ReferencedCard({ node, reason }) {
      const copy = () => { try { navigator.clipboard.writeText(node.path); } catch (e) {} };
      return (
        <div className="viewer-pad">
          <div className="ph-card">
            <span className="ph-eyebrow">{node.type} · referenced</span>
            <h3>{node.name}</h3>
            <p style={{ color: 'var(--fg-muted)', fontSize: 13, margin: 0, lineHeight: 1.55 }}>{reason}</p>
            <div className="ph-meta">{node.path} · {fmtBytes(node.size)}</div>
            <div className="ph-row">
              <button className="btn" onClick={copy}><Icon d={I.copy} />copy path</button>
              <a className="btn" href={srcFor(node.path)} target="_blank" rel="noreferrer"><Icon d={I.html} />open directly</a>
            </div>
          </div>
        </div>
      );
    }

    function fmtBytes(n) { if (n == null) return '—'; if (n < 1024) return n + ' B'; if (n < 1024 * 1024) return (n / 1024).toFixed(1) + ' KB'; return (n / 1048576).toFixed(2) + ' MB'; }

    function subtabsFor(node) {
      if (!node) return [];
      if (node.type === 'markdown') return [['rendered', 'Rendered'], ['raw', 'Raw']];
      if (node.type === 'design' || node.type === 'html-artifact' || node.type === 'pdf') return [['preview', 'Preview'], ['source', 'Source']];
      return [];
    }

    function Viewer({ node, sub, theme }) {
      if (!node) return (
        <div className="empty">
          <div className="empty-glyph"><Icon d={I.tree} size={34} /></div>
          <h3>{(DATA.plan && DATA.plan.title) || META.title || 'Plan explorer'}</h3>
          <p>Pick a file on the left to open it here. Markdown renders inline; the board, the living spec, and designs open as live previews.</p>
        </div>
      );
      const isFrame = (node.type === 'html-artifact' || node.type === 'design' || node.type === 'pdf') && sub !== 'source';
      return (
        <div className={'viewer' + (isFrame ? ' is-frame' : '')}>
          {node.type === 'markdown' ? <MarkdownView node={node} sub={sub} />
            : (node.type === 'html-artifact' || node.type === 'design' || node.type === 'pdf') ? <FrameView node={node} sub={sub} theme={theme} />
            : node.type === 'image' ? <ImageView node={node} />
            : node.type === 'svg' ? <SvgView node={node} />
            : (node.type === 'code' || node.type === 'json' || node.type === 'text') ? <CodeView node={node} />
            : <ReferencedCard node={node} reason="No inline viewer for this file type." />}
        </div>
      );
    }

    /* ── rail ──────────────────────────────────────────────────────────── */
    function Rail({ node, art, toast }) {
      if (!node) return (
        <div className="rail"><div className="rail-inner"><div className="rail-card"><span className="rail-label">Details</span><p style={{ color: 'var(--fg-muted)', fontSize: 13, margin: 0 }}>Select a file to see its metadata, IDs, and quick actions.</p></div>
          <div className="rail-card"><span className="rail-label">Plan</span>
            <div className="rail-kv">
              <span className="rail-k">profile</span><span className="rail-v">{PROFILE}</span>
              <span className="rail-k">files</span><span className="rail-v">{DATA.stats ? DATA.stats.files : ALL.filter(n => n.type !== 'dir').length}</span>
              <span className="rail-k">embedded</span><span className="rail-v">{DATA.stats ? DATA.stats.embedded : '—'}</span>
              <span className="rail-k">referenced</span><span className="rail-v">{DATA.stats ? DATA.stats.referenced : '—'}</span>
            </div></div></div></div>
      );
      const b = node.badges || {};
      const sendToChat = async () => {
        const txt = 'Look at `' + node.path + '` in this groundwork plan.';
        if (art.inShell && art.sendToActiveSession) { const r = await art.sendToActiveSession({ prompt: txt, source: 'explorer' }); if (!r.ok) { try { navigator.clipboard.writeText(txt); } catch (e) {} toast('Copied reference'); } else toast('Sent to chat'); }
        else { try { navigator.clipboard.writeText(txt); } catch (e) {} toast('Copied reference'); }
      };
      const copyPath = () => { try { navigator.clipboard.writeText(node.path); } catch (e) {} toast('Path copied'); };
      return (
        <div className="rail"><div className="rail-inner">
          <div className="rail-card">
            <span className="rail-label">{node.type}{node.kind && node.kind !== node.type ? ' · ' + node.kind : ''}</span>
            <h3 className="rail-title">{node.name}</h3>
            <div className="rail-tags"><NodeBadges node={node} /></div>
            <div className="rail-kv">
              <span className="rail-k">path</span><span className="rail-v mono">{node.path}</span>
              <span className="rail-k">size</span><span className="rail-v">{fmtBytes(node.size)}</span>
              <span className="rail-k">source</span><span className="rail-v">{node.embedded ? 'embedded' : (node.type === 'dir' ? '—' : 'referenced')}</span>
              {b.design ? <Fragment><span className="rail-k">design</span><span className="rail-v">{b.design.phase || '—'}{b.design.wp ? ' · ' + b.design.wp : ''}{b.design.locked ? ' · locked (' + (b.design.locked_in || '') + ')' : ''}</span></Fragment> : null}
              {b.subplan ? <Fragment><span className="rail-k">subplan</span><span className="rail-v">{b.subplan.archetype} · {b.subplan.ref || 'cross-cutting'} · {b.subplan.status}</span></Fragment> : null}
              {b.fences ? <Fragment><span className="rail-k">fences</span><span className="rail-v mono">{b.fences.join(', ')}</span></Fragment> : null}
              {b.dirty_regions ? <Fragment><span className="rail-k">dirty</span><span className="rail-v mono" style={{ color: 'var(--danger)' }}>{b.dirty_regions.join(', ')}</span></Fragment> : null}
            </div>
          </div>
          <div className="rail-card">
            <span className="rail-label">Actions</span>
            <div className="rail-actions">
              <button className="btn" onClick={copyPath}><Icon d={I.copy} />Copy path</button>
              <button className="btn" onClick={sendToChat}><Icon d={I.send} />Send to chat</button>
            </div>
          </div>
        </div></div>
      );
    }

    /* ── search (filename + full-text over embedded content) ───────────── */
    function esc(s) { return (s || '').replace(/[&<>"]/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c])); }
    function highlight(text, q) {
      const e = esc(text);
      if (!q) return e;
      const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'ig');
      return e.replace(re, '<mark>$1</mark>');
    }
    function searchPlan(q) {
      const ql = q.toLowerCase();
      const out = [];
      for (const n of ALL) {
        if (n.type === 'dir') continue;
        const nameMatch = n.name.toLowerCase().includes(ql) || n.path.toLowerCase().includes(ql);
        let snip = null, contentMatch = false;
        if (n.embedded && n.content) {
          const i = n.content.toLowerCase().indexOf(ql);
          if (i >= 0) {
            contentMatch = true;
            const s = Math.max(0, i - 32);
            snip = (s > 0 ? '…' : '') + n.content.slice(s, i + ql.length + 56).replace(/\s+/g, ' ').trim() + '…';
          }
        }
        if (nameMatch || contentMatch) out.push({ n, nameMatch, contentMatch, snip });
        if (out.length >= 300) break;
      }
      out.sort((a, b) => (b.nameMatch ? 1 : 0) - (a.nameMatch ? 1 : 0));
      return out;
    }
    function SearchResults({ q, onOpen, activePath }) {
      const results = useMemo(() => searchPlan(q), [q]);
      if (!results.length) return <div className="results-empty">No files match “{q}”.</div>;
      return (
        <div className="results">
          <div className="results-head">{results.length}{results.length >= 300 ? '+' : ''} match{results.length === 1 ? '' : 'es'}</div>
          {results.map(({ n, nameMatch, contentMatch, snip }) => (
            <button key={n.path} className={'result' + (activePath === n.path ? ' is-active' : '')} onClick={() => onOpen(n)}>
              <div className="result-name">
                <span className="tree-icon"><Icon d={typeIcon(n.kind === 'anchor' ? 'anchor' : n.type)} /></span>
                <span className="rn-text" dangerouslySetInnerHTML={{ __html: highlight(n.name, q) }} />
                <span className="result-badge">{nameMatch ? 'name' : 'text'}</span>
              </div>
              {contentMatch && snip ? <div className="result-snip" dangerouslySetInnerHTML={{ __html: highlight(snip, q) }} /> : <div className="result-path">{n.path}</div>}
            </button>
          ))}
        </div>
      );
    }

    /* ── app ───────────────────────────────────────────────────────────── */
    const designNodes = ALL.filter((n) => n.type === 'design');
    const mediaNodes = ALL.filter((n) => n.type === 'image' || n.type === 'pdf' || n.type === 'svg');
    function profileDefaultMode() {
      if (OVERLAY.defaultMode) return OVERLAY.defaultMode;
      if (PROFILE === 'design-system' && designNodes.length) return 'gallery';
      if (PROFILE === 'content' && mediaNodes.length) return 'media';
      return 'tree';
    }

    function App({ art }) {
      const persisted = loadState();
      const [theme, setTheme] = useState(() => ({
        theme: document.documentElement.getAttribute('data-theme') || 'A',
        mode: document.documentElement.getAttribute('data-mode') || 'dark',
        density: document.documentElement.getAttribute('data-density') || 'comfortable',
      }));
      const [leftMode, setLeftMode] = useState(persisted.leftMode || profileDefaultMode());
      const [query, setQuery] = useState('');
      const searchRef = useRef(null);
      const [openTabs, setOpenTabs] = useState(persisted.openTabs && persisted.openTabs.filter((p) => byPath[p]) || []);
      const [active, setActive] = useState(persisted.active && byPath[persisted.active] ? persisted.active : null);
      const [subBy, setSubBy] = useState({});
      const [openDirs, setOpenDirs] = useState(persisted.openDirs || {});
      const [railOpen, setRailOpen] = useState(persisted.railOpen != null ? persisted.railOpen : (OVERLAY.railOpen != null ? OVERLAY.railOpen : true));
      const [toastMsg, setToastMsg] = useState(null);
      const toastTimer = useRef(null);
      const toast = (m) => { setToastMsg(m); clearTimeout(toastTimer.current); toastTimer.current = setTimeout(() => setToastMsg(null), 1800); };

      useEffect(() => { saveState({ leftMode, openTabs, active, openDirs, railOpen }); }, [leftMode, openTabs, active, openDirs, railOpen]);
      useEffect(() => { if (art.inShell && art.pin) { try { art.pin(); } catch (e) {} } }, []);
      // keyboard: '/' focuses search, Esc clears it
      useEffect(() => {
        const onKey = (e) => {
          const tag = document.activeElement && document.activeElement.tagName;
          if (e.key === '/' && tag !== 'INPUT' && tag !== 'TEXTAREA') { e.preventDefault(); searchRef.current && searchRef.current.focus(); }
          else if (e.key === 'Escape' && query) { setQuery(''); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, [query]);
      useEffect(() => { if (art.publishState) art.publishState('explorer', { active, leftMode, openCount: openTabs.length }); }, [active, leftMode, openTabs.length]);

      // mirror shell theme pushes onto local state (so iframes re-receive)
      useEffect(() => {
        const obs = new MutationObserver(() => setTheme({
          theme: document.documentElement.getAttribute('data-theme') || 'A',
          mode: document.documentElement.getAttribute('data-mode') || 'dark',
          density: document.documentElement.getAttribute('data-density') || 'comfortable',
        }));
        obs.observe(document.documentElement, { attributes: true, attributeFilter: ['data-theme', 'data-mode', 'data-density'] });
        return () => obs.disconnect();
      }, []);

      const setThemeAttr = (k, v) => { document.documentElement.setAttribute('data-' + k, v); setTheme((t) => ({ ...t, [k]: v })); };

      const openNode = useCallback((node) => {
        if (!node || node.type === 'dir') return;
        setOpenTabs((tabs) => tabs.includes(node.path) ? tabs : [...tabs, node.path]);
        setActive(node.path);
        if (art.publishState) art.publishState('selection', { path: node.path, kind: node.kind });
      }, [art]);
      const closeTab = (path, e) => {
        e && e.stopPropagation();
        setOpenTabs((tabs) => { const idx = tabs.indexOf(path); const next = tabs.filter((p) => p !== path);
          if (active === path) setActive(next.length ? next[Math.min(idx, next.length - 1)] : null);
          return next; });
      };
      const toggleDir = (path, val) => setOpenDirs((d) => ({ ...d, [path]: val }));

      const activeNode = active ? byPath[active] : null;
      const subs = subtabsFor(activeNode);
      const sub = activeNode ? (subBy[active] || (subs[0] && subs[0][0])) : null;

      const modes = [['tree', 'Tree', I.tree]];
      if (designNodes.length) modes.push(['gallery', 'Gallery', I.grid]);
      if (mediaNodes.length) modes.push(['media', 'Media', I.media]);

      // grouped tree top level
      const grouped = useMemo(() => {
        const groups = {}; DATA.tree.forEach((n) => { (groups[n.kind === 'dir' ? dirGroup(n) : n.kind] = groups[n.kind === 'dir' ? dirGroup(n) : n.kind] || []).push(n); });
        return groups;
      }, []);
      function dirGroup(n) { const map = { artifact: 'artifact', designs: 'design', drafts: 'draft', parts: 'parts', foundations: 'parts' }; return map[n.name] || 'other'; }

      return (
        <div className="shell">
          <div className="topbar">
            <div className="topbar-titles">
              <span className="topbar-eyebrow"><span className="dot-tint" />groundwork · explorer{USING_MOCK ? ' · mock' : ''}</span>
              <h1 className="topbar-title">{OVERLAY.title || (DATA.plan && DATA.plan.title) || META.title || 'Plan explorer'}</h1>
            </div>
            <div className="topbar-spacer" />
            <div className="topbar-actions">
              <span className={'host-badge ' + (USING_MOCK ? 'mock' : (art.inShell ? 'in-shell' : ''))}>{USING_MOCK ? 'mock' : (art.inShell ? 'in-shell' : 'browser')}</span>
              <div className="seg" title="theme">
                {['A', 'B', 'C'].map((t) => <button key={t} className={theme.theme === t ? 'is-on' : ''} onClick={() => setThemeAttr('theme', t)}>{t}</button>)}
              </div>
              <div className="seg" title="mode">
                {['dark', 'light'].map((md) => <button key={md} className={theme.mode === md ? 'is-on' : ''} onClick={() => setThemeAttr('mode', md)}>{md[0].toUpperCase()}</button>)}
              </div>
              <button className={'iconbtn' + (railOpen ? ' is-on' : '')} title="toggle details" onClick={() => setRailOpen(!railOpen)}><Icon d={I.info} /></button>
            </div>
          </div>

          <div className={'workspace' + (railOpen ? ' with-rail' : '')}>
            <div className="sidebar">
              <div className="search">
                <div className="search-box">
                  <Icon d={I.search} size={13} />
                  <input ref={searchRef} value={query} onChange={(e) => setQuery(e.target.value)} placeholder="Search files + contents…" spellCheck={false} />
                  {query ? <span className="search-clear" onClick={() => setQuery('')}><Icon d={I.x} size={12} /></span> : <span className="search-kbd">/</span>}
                </div>
              </div>
              {!query.trim() && (
                <div className="sidebar-head">
                  <div className="seg">
                    {modes.map(([m, label, ic]) => <button key={m} className={leftMode === m ? 'is-on' : ''} onClick={() => setLeftMode(m)}><Icon d={ic} size={12} />{label}</button>)}
                  </div>
                </div>
              )}
              {DATA.stats && !query.trim() && <div className="sidebar-stats">{DATA.stats.files} files · {DATA.stats.embedded} embedded · {DATA.stats.referenced} referenced{DATA.stats.truncated && DATA.stats.truncated.length ? ' · ' + DATA.stats.truncated.length + ' over budget' : ''}</div>}
              <div className="sidebar-body">
                {query.trim() ? <SearchResults q={query.trim()} onOpen={openNode} activePath={active} /> : (
                  <Fragment>
                    {leftMode === 'tree' && KIND_GROUPS.map(([k, label]) => grouped[k] && grouped[k].length ? (
                      <Fragment key={k}>
                        <div className="group-label">{label}</div>
                        {grouped[k].map((n) => <TreeNode key={n.path} node={n} depth={0} open={openDirs} toggle={toggleDir} activePath={active} onOpen={openNode} />)}
                      </Fragment>
                    ) : null)}
                    {leftMode === 'gallery' && <Gallery nodes={designNodes} activePath={active} onOpen={openNode} />}
                    {leftMode === 'media' && <MediaGrid nodes={mediaNodes} activePath={active} onOpen={openNode} />}
                  </Fragment>
                )}
              </div>
            </div>

            <div className="main">
              {openTabs.length > 0 && (
                <div className="tabbar">
                  {openTabs.map((p) => { const n = byPath[p]; if (!n) return null; return (
                    <button key={p} className={'tab' + (active === p ? ' is-active' : '')} onClick={() => setActive(p)}>
                      <span className="tab-icon"><Icon d={typeIcon(n.kind === 'anchor' ? 'anchor' : n.type)} size={13} /></span>
                      <span className="tab-name">{n.name}</span>
                      <span className="tab-x" onClick={(e) => closeTab(p, e)}><Icon d={I.x} size={12} /></span>
                    </button>
                  ); })}
                </div>
              )}
              {activeNode && subs.length > 0 && (
                <div className="subtabs">
                  {subs.map(([s, label]) => <button key={s} className={'subtab' + (sub === s ? ' is-on' : '')} onClick={() => setSubBy((x) => ({ ...x, [active]: s }))}>{label}</button>)}
                  <span className="subtab-spacer" />
                  <span className="subtab-path">{activeNode.path}</span>
                </div>
              )}
              <Viewer node={activeNode} sub={sub} theme={theme} />
            </div>

            {railOpen && <Rail node={activeNode} art={art} toast={toast} />}
          </div>

          {toastMsg && <div className="toast">{toastMsg}</div>}
        </div>
      );
    }

    window.__groundwork_bridge_polyfill__.init().then((art) =>
      ReactDOM.createRoot(document.getElementById('root')).render(<App art={art} />));
  })();
  </script>
</body>
</html>
